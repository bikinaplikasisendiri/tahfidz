<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hifdzul Qur'an App</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            background-color: #065f46;
        }
        iframe { display: block; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <iframe 
        id="app-frame"
        src="https://script.google.com/macros/s/AKfycbx5wBJQ542JamHOfs7Xtc98RMYWXJ1yJw00aA0udNTKPy6xZHAmeUWgO9eyCLlqRIVX/exec"
        allow="camera; geolocation; clipboard-write"
    ></iframe>

    <script>
        // Fix: cegah WebView close saat tombol back/gesture
        history.pushState(null, '', location.href);
        window.addEventListener('popstate', function() {
            history.pushState(null, '', location.href);
        });
    </script>
</body>
</html>
