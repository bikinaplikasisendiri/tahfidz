<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#009688">
  <title>Hifdzul Qur'an App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #065f46; }
    
    #app-frame { 
      width: 100%; height: 100%; border: none; display: block;
      opacity: 0; transition: opacity 0.3s ease;
    }
    #app-frame.show { opacity: 1; }
    
    #loading {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(180deg, #065f46 0%, #10b981 50%, #d1fae5 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 99999; transition: opacity 0.3s ease-out;
    }
    #loading.hide { opacity: 0; pointer-events: none; }
    #loading .spinner {
      width: 36px; height: 36px; border: 4px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    #loading .text { color: rgba(255,255,255,0.8); font-family: 'Poppins', sans-serif; font-size: 13px; margin-top: 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Loading Screen - tanpa icon, hanya spinner -->
  <div id="loading">
    <div class="spinner"></div>
    <div class="text">Memuat aplikasi...</div>
  </div>

  <!-- Google Apps Script App via iframe -->
  <iframe 
    id="app-frame"
    src="https://script.google.com/macros/s/AKfycbx5wBJQ542JamHOfs7Xtc98RMYWXJ1yJw00aA0udNTKPy6xZHAmeUWgO9eyCLlqRIVX/exec"
    allow="camera; geolocation; clipboard-write; download; popups"
  ></iframe>

  <script>
    // Fix: cegah WebView close saat tombol back/gesture
    history.pushState(null, '', location.href);
    window.addEventListener('popstate', function() {
      history.pushState(null, '', location.href);
    });

    var frame = document.getElementById('app-frame');
    var loading = document.getElementById('loading');

    var loadTimeout = setTimeout(function() {
      loading.classList.add('hide');
      frame.classList.add('show');
    }, 5000);

    frame.onload = function() {
      clearTimeout(loadTimeout);
      setTimeout(function() {
        loading.classList.add('hide');
        frame.classList.add('show');
      }, 800);
    };
  </script>
</body>
</html>
