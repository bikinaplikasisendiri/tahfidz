<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#009688">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Hifdzul Qur'an App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #065f46; }
    
    /* iframe tersembunyi dulu, baru muncul setelah loading selesai */
    #app-frame { 
      width: 100%; height: 100%; border: none; display: block;
      opacity: 0; transition: opacity 0.3s ease;
    }
    #app-frame.show { opacity: 1; }
    
    #loading {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(180deg, #065f46 0%, #10b981 50%, #d1fae5 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 99999; transition: opacity 0.3s ease-out;
    }
    #loading.hide { opacity: 0; pointer-events: none; }
    #loading .icon {
      width: 64px; height: 64px; background: rgba(255,255,255,0.2);
      border-radius: 18px; display: flex; align-items: center; justify-content: center;
      margin-bottom: 16px; backdrop-filter: blur(10px);
      animation: pulse 1.5s ease-in-out infinite;
    }
    #loading .icon svg { width: 32px; height: 32px; fill: white; }
    #loading .spinner {
      width: 28px; height: 28px; border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    #loading .text { color: rgba(255,255,255,0.8); font-family: 'Poppins', sans-serif; font-size: 13px; margin-top: 12px; }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading">
    <div class="icon">
      <svg viewBox="0 0 24 24"><path d="M6 2C4.9 2 4 2.9 4 4v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6H6zm7 1.5L18.5 9H13V3.5zM8 14c0-1.1.9-2 2-2h4c1.1 0 2 .9 2 2s-.9 2-2 2h-4c-1.1 0-2-.9-2-2zm0 4c0-1.1.9-2 2-2h4c1.1 0 2 .9 2 2s-.9 2-2 2h-4c-1.1 0-2-.9-2-2z"/></svg>
    </div>
    <div class="spinner"></div>
    <div class="text">Memuat aplikasi...</div>
  </div>

  <!-- Google Apps Script App via iframe -->
  <iframe 
    id="app-frame"
    src="https://script.google.com/macros/s/AKfycbx5wBJQ542JamHOfs7Xtc98RMYWXJ1yJw00aA0udNTKPy6xZHAmeUWgO9eyCLlqRIVX/exec"
    allow="camera; geolocation; clipboard-write"
  ></iframe>

  <script>
    // === FIX: Cegah WebView close saat tombol back/gesture ditekan ===
    history.pushState(null, '', location.href);
    window.addEventListener('popstate', function(event) {
      history.pushState(null, '', location.href);
    });

    var frame = document.getElementById('app-frame');
    var loading = document.getElementById('loading');

    // Fallback: sembunyikan loading setelah 5 detik max
    var loadTimeout = setTimeout(function() {
      loading.classList.add('hide');
      frame.classList.add('show');
    }, 5000);

    frame.onload = function() {
      clearTimeout(loadTimeout);
      setTimeout(function() {
        loading.classList.add('hide');
        frame.classList.add('show');
      }, 800);
    };
  </script>
</body>
</html>
