  // --- SESSION TIMEOUT FUNCTIONS ---
  
  // Cek apakah session masih valid
  function isSessionValid_() {
    if (!curUser || !curUser.loginTime) return false;
    var now = Date.now();
    var elapsed = now - curUser.loginTime;
    return elapsed < SESSION_TIMEOUT_MS;
  }
  
  // Dalam berapa menit session akan expired
  function getSessionRemainingMinutes_() {
    if (!curUser || !curUser.loginTime) return 0;
    var now = Date.now();
    var elapsed = now - curUser.loginTime;
    var remaining = SESSION_TIMEOUT_MS - elapsed;
    return Math.max(0, Math.ceil(remaining / 60000));
  }
  
  // Update loginTime (reset timeout) saat user aktif
  function refreshSession_() {
    if (curUser) {
      curUser.loginTime = Date.now();
      localStorage.setItem('hifdzul_user', JSON.stringify(curUser));
    }
  }
  
  // Force logout karena session expired
  function forceLogout_(reason) {
    // Bersihkan interval
    if (sessionCheckInterval) {
      clearInterval(sessionCheckInterval);
      sessionCheckInterval = null;
    }
    if (prayerCountdownInterval) {
      clearInterval(prayerCountdownInterval);
      prayerCountdownInterval = null;
    }
    if (bigClockInterval) {
      clearInterval(bigClockInterval);
      bigClockInterval = null;
    }
    
    // Tampilkan pesan sebelum logout
    var msg = reason || 'Sesi Anda telah berakhir. Silakan login kembali.';
    showToast(msg, 'warning');
    
    // Bersihkan session
    curUser = null;
    localStorage.removeItem('hifdzul_user');
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
    
    // Kembali ke halaman login
    setTimeout(function() {
      changeScreen('screen-welcome');
    }, 1500);
  }
  
  // Mulai interval pengecekan session
  function startSessionChecker_() {
    // Bersihkan interval lama jika ada
    if (sessionCheckInterval) {
      clearInterval(sessionCheckInterval);
    }
    
    sessionCheckInterval = setInterval(function() {
      if (curUser && !isSessionValid_()) {
        forceLogout_('Sesi 8 jam telah habis. Silakan login kembali.');
      }
    }, SESSION_CHECK_INTERVAL_MS);
  }
  
  // Reset session timer saat user berinteraksi
  function setupActivityTracker_() {
    var events = ['mousedown', 'keydown', 'touchstart', 'scroll'];
    var throttleTimer = null;
    
    events.forEach(function(event) {
      document.addEventListener(event, function() {
        // Throttle: hanya refresh setiap 1 menit
        if (throttleTimer) return;
        throttleTimer = setTimeout(function() {
          throttleTimer = null;
        }, 60000);
        
        if (curUser && isSessionValid_()) {
          refreshSession_();
        }
      }, { passive: true });
    });
  }

  // --- UTILS ---
  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
  }

  function escAttr(s) {
    if (!s) return '';
    return String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;');
  }

  function compressImage(file, maxSize, quality, callback) {
    var reader = new FileReader();
    reader.onload = function(e) {
      var img = new Image();
      img.onload = function() {
        var canvas = document.createElement('canvas');
        var w = img.width;
        var h = img.height;
        if (w > h) {
          if (w > maxSize) { h = h * maxSize / w; w = maxSize; }
        } else {
          if (h > maxSize) { w = w * maxSize / h; h = maxSize; }
        }
        canvas.width = w;
        canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        callback(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function showToast(msg, type) {
    type = type || 'success';
    var t = document.getElementById('toast-container');
    var i = document.getElementById('toast-icon');
    var m = document.getElementById('toast-msg');
    if (!t) return;

    // Reset class
    t.className = '';
    m.innerText = msg;

    // Set icon dan warna berdasarkan tipe
    switch(type) {
      case 'error':
        i.className = 'fas fa-exclamation-circle';
        t.classList.add('toast-error');
        break;
      case 'warning':
        i.className = 'fas fa-exclamation-triangle';
        t.classList.add('toast-warning');
        break;
      case 'info':
        i.className = 'fas fa-info-circle';
        t.classList.add('toast-info');
        break;
      default:
        i.className = 'fas fa-check-circle';
        t.classList.add('toast-success');
    }

    // Tampilkan toast
    requestAnimationFrame(function() {
      t.classList.add('show');
    });

    // Sembunyikan setelah 3 detik
    setTimeout(function() { t.classList.remove('show'); }, 3000);
  }

  function loadNotifications() {
    if (!curUser) return;
    google.script.run.withSuccessHandler(function(data) {
      var html = '', hasUnread = false;
      if (!data || data.length === 0) {
        html = '<div class="text-center mt-5 text-muted small"><i class="far fa-bell-slash mb-2 fa-2x opacity-50"></i><br>Tidak ada notifikasi</div>';
      } else {
        data.forEach(function(n) {
          if (!n.read) hasUnread = true;
          var bgClass = n.type === 'Ziyadah' ? 'bg-red-soft' : (n.type === 'Murajaah' ? 'bg-green-soft' : 'bg-light text-primary');
          var icon = n.type === 'Ziyadah' ? 'fa-book' : (n.type === 'Murajaah' ? 'fa-microphone' : 'fa-info');
          
          html += '<div class="notif-item ' + (n.read ? '' : 'unread') + '"><div class="notif-icon ' + bgClass + '"><i class="fas ' + icon + '"></i></div><div class="notif-content"><h6>' + escapeHtml(n.title) + '</h6><p>' + escapeHtml(n.msg) + '</p><div class="notif-time">' + escapeHtml(n.time) + '</div></div></div>';
        });
      }
      document.getElementById('notif-list').innerHTML = html;
      var badge = document.getElementById('notif-badge');
      if (hasUnread) badge.classList.remove('d-none');
      else badge.classList.add('d-none');
    }).getNotifications(curUser.id);
  }

  function markRead() {
    if (!curUser) return;
    
    var badge = document.getElementById('notif-badge');
    if (badge) { badge.classList.add('d-none'); badge.innerHTML = ''; }
    
    document.querySelectorAll('.notif-item.unread').forEach(function(el) {
      el.classList.remove('unread');
    });

    google.script.run.withSuccessHandler(function() {
      loadNotifications();
      showToast('Semua ditandai sudah dibaca');
    }).markAllRead(curUser.id);
  }

  function loadHistory() {
    if (!curUser) return;
    google.script.run.withSuccessHandler(function(data) {

      if (!list) return;
      var html = '';
      if (!data || data.length == 0) {
        html = '<div class="text-center py-4"><div style="width:50px; height:50px; background:linear-gradient(135deg, #F1F5F9, #E2E8F0); border-radius:16px; display:flex; align-items:center; justify-content:center; margin:0 auto 10px auto;"><i class="fas fa-inbox text-muted" style="font-size:20px; opacity:0.5;"></i></div><p class="text-muted small mb-0">Belum ada aktivitas</p></div>';
      } else {
        data.forEach(function(item) {
          var dataStr = JSON.stringify(item).replace(/"/g, '&quot;');
          var isAuth = (curUser.role !== 'Santri');
          var clickAction = isAuth ? 'onclick="openSetoranAction(' + dataStr + ')"' : '';
          var cursorStyle = isAuth ? 'cursor:pointer;' : '';

          // Warna ikon berdasarkan tipe
          var isZiyadah = item.tipe === 'Ziyadah';
          var iconBg = isZiyadah ? 'linear-gradient(135deg, #FEE2E2, #FECACA)' : 'linear-gradient(135deg, #D1FAE5, #A7F3D0)';
          var iconColor = isZiyadah ? '#EF4444' : '#10B981';
          var icon = isZiyadah ? 'fa-book-open' : 'fa-microphone';
          var nilaiColor = isZiyadah ? '#EF4444' : '#10B981';

          html += '<div class="item-row" style="' + cursorStyle + ' margin-bottom:10px;" ' + clickAction + '>'
            + '<div class="d-flex align-items-center flex-grow-1">'
            + '<div style="width:40px; height:40px; background:' + iconBg + '; border-radius:12px; display:flex; align-items:center; justify-content:center; margin-right:12px; flex-shrink:0;">'
            + '<i class="fas ' + icon + '" style="font-size:14px; color:' + iconColor + ';"></i>'
            + '</div>'
            + '<div>'
            + '<h6 class="fw-bold mb-0 text-dark" style="font-size:13px;">' + escapeHtml(item.surat) + ' : ' + escapeHtml(item.ayat) + '</h6>'
            + '<small class="text-muted" style="font-size:10px;">' + escapeHtml(item.nama) + ' &bull; ' + escapeHtml(item.tipe) + '</small>'
            + '</div>'
            + '</div>'
            + '<div class="text-end">'
            + '<small class="fw-bold d-block" style="font-size:12px; color:' + nilaiColor + ';">' + escapeHtml(item.nilai_info || '') + '</small>'
            + '<small class="text-muted" style="font-size:9px;">' + escapeHtml(item.tanggal) + '</small>'
            + '</div>'
            + '</div>';
        });
      }
      list.innerHTML = html;
    }).getRiwayatHafalan(curUser.id, curUser.role);
  }

  function toggleBulkSelect(nis, el) {
    var idx = selectedSantriForBulk.indexOf(nis);
    if (idx > -1) {
      selectedSantriForBulk.splice(idx, 1);
      el.closest('.item-row').classList.remove('border-primary');

      selectedSantriForBulk.push(nis);
      el.closest('.item-row').classList.add('border-primary');

  function updateBulkDeleteBtn() {
    var bulkActions = document.getElementById('santri-bulk-actions');
    var count = document.getElementById('bulk-delete-count');
    var filterPanel = document.getElementById('santri-filter-panel');

    if (selectedSantriForBulk.length > 0) {
      // Tampilkan panel filter jika belum terbuka
      if (filterPanel && filterPanel.classList.contains('d-none')) {
        filterPanel.classList.remove('d-none');
      }
      if (bulkActions) bulkActions.classList.remove('d-none');

          + (canEdit ? '<i class="fas fa-pen text-primary" style="cursor:pointer;font-size:13px;" onclick="event.stopPropagation(); editSantriDirect(\'' + safeNis + '\')"></i>' : '')

  function filterList(type) {
    if (type !== 'santri') {
      // Selector (pilih santri untuk input setoran) - tidak ada filter kelas
      var k = document.getElementById('search-selector').value.toLowerCase();
      renderList('list-selector', santriDB.filter(function(s) {
        return s.nama.toLowerCase().includes(k) || String(s.nis).includes(k);
      }));
      return;
    }
    
    // Filter untuk tab santri (admin)
    var searchKey = document.getElementById('searchSantri').value.toLowerCase();
    
    var filtered = santriDB.filter(function(s) {
      var matchSearch = s.nama.toLowerCase().includes(searchKey) || String(s.nis).includes(searchKey);
      var matchKelas = !santriKelasFilter || s.kelas === santriKelasFilter;
      return matchSearch && matchKelas;
    });
    renderList('list-santri', filtered);
  }

  function handleImportFile(input) {
    var file = input.files[0];
    if (!file) return;

    // Validasi ukuran (maks 5MB)
    if (file.size > 5 * 1024 * 1024) {
      showToast('Ukuran file maksimal 5MB', 'error');
      input.value = '';
      return;
    }

    // Tampilkan info file
    document.getElementById('import-file-info').classList.remove('d-none');
    document.getElementById('import-file-name').innerText = file.name;

    // Baca file dengan FileReader
    var reader = new FileReader();
    reader.onload = function(e) {
      var data = new Uint8Array(e.target.result);
      var workbook = XLSX.read(data, { type: 'array' });

      // Ambil sheet pertama
      var firstSheet = workbook.SheetNames[0];
      var worksheet = workbook.Sheets[firstSheet];

      // Konversi ke JSON
      var jsonData = XLSX.utils.sheet_to_json(worksheet, { defval: '' });

      // Proses dan validasi
      processImportData(jsonData);
    };
    reader.readAsArrayBuffer(file);
  }

  function processImportData(rows) {
    importData = [];
    var validCount = 0;
    var errorCount = 0;
    var previewHtml = '';
    var errorHtml = '';

    rows.forEach(function(row, idx) {
      var nis = String(row['NIS'] || row['nis'] || '').trim();
      var nama = String(row['Nama'] || row['nama'] || '').trim();
      var gender = String(row['Jenis_Kelamin'] || row['jenis_kelamin'] || row['JK'] || 'Laki-laki').trim();
      var tgl = String(row['Tanggal_Lahir'] || row['tanggal_lahir'] || '').trim();
      var wali = String(row['Wali'] || row['wali'] || '').trim();
      var hp = String(row['HP'] || row['hp'] || '').trim();
      var kelas = String(row['Kelas'] || row['kelas'] || '').trim();

      var errors = [];
      if (!nis) errors.push('NIS kosong');
      if (!nama) errors.push('Nama kosong');
      if (!kelas) errors.push('Kelas kosong');

      var rowHtml = '<div class="d-flex align-items-center py-2 border-bottom" style="font-size:11px;">';
      rowHtml += '<div style="width:25px; color:#94A3B8;">' + (idx + 1) + '</div>';
      rowHtml += '<div style="flex:1;">';
      rowHtml += '<span class="fw-bold text-dark">' + escapeHtml(nama || '-') + '</span>';
      rowHtml += ' <small class="text-muted">(' + escapeHtml(nis || '-') + ')</small>';
      rowHtml += ' <small class="text-muted">' + escapeHtml(kelas || '-') + '</small>';
      rowHtml += '</div>';

      if (errors.length > 0) {
        errorCount++;
        rowHtml += '<span class="badge bg-danger" style="font-size:8px;">' + errors.join(', ') + '</span>';
        errorHtml += '<div class="text-danger small py-1" style="font-size:10px;">Baris ' + (idx + 1) + ': ' + errors.join(', ') + '</div>';
      } else {
        validCount++;
        rowHtml += '<i class="fas fa-check-circle text-success"></i>';
        importData.push({ nis: nis, nama: nama, gender: gender, tgl: tgl, wali: wali, hp: hp, kelas: kelas });
      }

      rowHtml += '</div>';
      previewHtml += rowHtml;
    });

    // Update UI
    document.getElementById('import-count-valid').innerText = validCount;
    document.getElementById('import-count-error').innerText = errorCount;
    document.getElementById('import-preview-list').innerHTML = previewHtml;
    document.getElementById('import-preview-section').classList.remove('d-none');

    if (errorCount > 0) {
      document.getElementById('import-error-list').classList.remove('d-none');
      document.getElementById('import-error-list').innerHTML = errorHtml;
    } else {
      document.getElementById('import-error-list').classList.add('d-none');
    }

    if (validCount > 0) {
      document.getElementById('import-action-section').classList.remove('d-none');
    } else {
      document.getElementById('import-action-section').classList.add('d-none');
    }
  }

  function saveData() {
    if (!curUser) { showToast('Sesi habis, silakan login ulang', 'error'); return; }
    var nis = document.getElementById('val-nis').value;
    var surat = document.getElementById('val-surat').value;
    var start = parseInt(document.getElementById('val-ayat-start').value);
    var end = parseInt(document.getElementById('val-ayat-end').value);

    // Validasi Standar
    if (!nis) { showToast("Pilih Santri dulu", 'error'); return; }
    if (!surat) { showToast("Pilih Surat dulu", 'error'); return; }
    if (isNaN(start) || isNaN(end)) { showToast("Nomor ayat wajib diisi", 'error'); return; }
    if (start > end) { showToast("Ayat Mulai > Akhir!", 'error'); return; }
    if (start <= 0 || end <= 0) { showToast("Ayat tidak valid", 'error'); return; }

    // --- VALIDASI BARU: CEK AYAT HANTU ---
    var qData = quranDB.find(x => x.n === surat);
    if (qData) {
        if (end > qData.c) {
            showToast("Surat " + surat + " hanya sampai ayat " + qData.c + "!", 'error');
            return; // STOP! Jangan simpan.
        }
    }

    // Lanjut Simpan
    var tipe = document.getElementById('val-tipe').value;
    var d = {
      kategori: tipe,
      nisSantri: nis,
      namaSantri: document.getElementById('txt-selected-santri').innerText,
      surat: surat,
      juz: document.getElementById('val-juz').value,
      ayatMulai: start,
      ayatSelesai: end,
      nilai: tipe === 'Ziyadah' ? document.getElementById('val-nilai').value : '',
      lanjut: tipe === 'Murajaah' ? document.getElementById('val-lanjut').value : '',
      catatan: document.getElementById('val-catatan').value,
      namaUst: curUser.nama
    };

    var btn = document.querySelector('.btn-save');
    if (btn) { btn.innerText = 'Menyimpan...'; btn.disabled = true; }
    
    google.script.run.withSuccessHandler(function(r) {
      showToast(r);
      if (btn) { btn.innerText = 'Simpan'; btn.disabled = false; }
      closeInputView();
      loadHistory();
    }).withFailureHandler(function() {
      showToast('Gagal menyimpan data', 'error');
      if (btn) { btn.innerText = 'Simpan'; btn.disabled = false; }
    }).simpanSetoran(d);
  }

  function initPrayerWidget() {
    var url = "";
    
    // Update Teks Lokasi di Dashboard (Ambil dari memori)
    var elLoc = document.getElementById('loc-name');
    if(elLoc) elLoc.innerText = savedCity;

    // LOGIKA CERDAS: Prioritaskan GPS tersimpan
    if (savedLat && savedLong && savedLat !== "null") {
      console.log("Menggunakan Mode GPS Tersimpan: " + savedCity);
      url = "https://api.aladhan.com/v1/timings?latitude=" + savedLat + "&longitude=" + savedLong + "&method=20";
    } else {
      console.log("Menggunakan Mode Kota Manual: " + savedCity);
      url = "https://api.aladhan.com/v1/timingsByCity?city=" + savedCity + "&country=Indonesia&method=20";
    }

    fetch(url)
      .then(response => response.json())
      .then(data => {
        if (!data || !data.data || !data.data.timings) {
          console.log("API response invalid");
          return;
        }
        var timings = data.data.timings;
        var dateHijri = data.data.date.hijri;
        var dateGreg = data.data.date.gregorian;
        
        // Tanggal Singkat (Feb)
        var shortMonth = dateGreg.month.en.substring(0, 3);
        var elDate = document.getElementById('prayer-date-info');
        if(elDate) elDate.innerText = dateGreg.day + " " + shortMonth + " " + dateGreg.year + " / " + dateHijri.day + " " + dateHijri.month.en + " " + dateHijri.year;
        
        processPrayerTimes(timings);
      })
      .catch(err => {
          console.log("Error API, Fallback Jakarta");
          // Jika error, jangan biarkan kosong, pakai Jakarta
          if(savedCity !== "Jakarta") {
              fetch("https://api.aladhan.com/v1/timingsByCity?city=Jakarta&country=Indonesia&method=20")
              .then(res=>res.json())
              .then(d=>{
                if (d && d.data && d.data.timings) processPrayerTimes(d.data.timings);
              })
              .catch(function(){ console.log("Fallback Jakarta juga gagal"); });
          }
      });
  }

  // 4. Fungsi GPS
  function useCurrentLocation(btn) {
      if (navigator.geolocation) {
          var oldText = btn.innerHTML;
          btn.innerHTML = "<i class='fas fa-circle-notch fa-spin'></i> Melacak...";
          
          navigator.geolocation.getCurrentPosition(function(position) {
              var lat = position.coords.latitude;
              var long = position.coords.longitude;
              
              google.script.run.withSuccessHandler(function(geoData) {
                  var finalName = "Lokasi GPS";

                  if (geoData && geoData.address) {
                      var addr = geoData.address;
                      var district = addr.village || addr.suburb || addr.town || addr.city_district || addr.municipality || addr.county || addr.district;
                      var city = addr.city || addr.regency || addr.state_district || addr.state;

                      if (district) {
                          var cleanDist = district.replace(new RegExp("Kecamatan", "i"), "").replace(new RegExp("Kelurahan", "i"), "").trim();
                          finalName = "Kec. " + cleanDist;
                      } else if (city) {
                          finalName = city;
                      }
                  }

                  savedCity = finalName;
                  savedLat = lat;
                  savedLong = long;
                  
                  localStorage.setItem('hifdzul_city', finalName);
                  localStorage.setItem('hifdzul_lat', lat);
                  localStorage.setItem('hifdzul_long', long);

                  document.getElementById('loc-name').innerText = finalName;

                  var prayerUrl = "https://api.aladhan.com/v1/timings?latitude=" + lat + "&longitude=" + long + "&method=20";
                  
                  fetch(prayerUrl)
                  .then(res => res.json())
                  .then(data => {
                      processPrayerTimes(data.data.timings);
                      closeLocationModal();
                      showToast("Lokasi: " + finalName);
                      btn.innerHTML = oldText;
                  })
                  .catch(function() {
                      closeLocationModal();
                      showToast("Lokasi tersimpan, tapi jadwal sholat gagal dimuat");
                      btn.innerHTML = oldText;
                  });

              }).getGeoLocation(lat, long);

          }, function(error) {
              var msg = 'Gagal mendeteksi lokasi.';
              if (error.code === 1) {
                  msg = 'Izin lokasi ditolak. Buka Pengaturan Android > Aplikasi > E-TAHFIDZ > Izin > Lokasi > Aktifkan.';
              } else if (error.code === 2) {
                  msg = 'GPS tidak aktif. Aktifkan GPS di Pengaturan > Lokasi.';
              } else if (error.code === 3) {
                  msg = 'Timeout GPS. Coba lagi di tempat terbuka.';
              }
              showToast(msg, 'error');
              btn.innerHTML = oldText;
          });
      } else {
          showToast('Browser tidak mendukung GPS.', 'warning');
      }
  }
  
  function processPrayerTimes(timings) {
    // Clear interval sebelumnya jika ada
    if (prayerCountdownInterval) {
      clearInterval(prayerCountdownInterval);
      prayerCountdownInterval = null;
    }
    
    var prayers = [
      { name: "Subuh", time: timings.Fajr },
      { name: "Dzuhur", time: timings.Dhuhr },
      { name: "Ashar", time: timings.Asr },
      { name: "Maghrib", time: timings.Maghrib },
      { name: "Isya", time: timings.Isha }
    ];

    var now = new Date();
    var nextPrayer = null;

    for (var i = 0; i < prayers.length; i++) {
      if (!prayers[i].time) continue;
      var pTime = new Date();
      var parts = prayers[i].time.split(':');
      pTime.setHours(parts[0], parts[1], 0);

      if (pTime > now) {
        nextPrayer = prayers[i];
        nextPrayer.obj = pTime;
        break;
      }
    }

    if (!nextPrayer || !nextPrayer.time) {
      nextPrayer = prayers[0];
      var tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      if (nextPrayer.time) {
        var parts = nextPrayer.time.split(':');
        tomorrow.setHours(parts[0], parts[1], 0);
      }
      nextPrayer.obj = tomorrow;
      nextPrayer.name = "Subuh";
    }

    document.getElementById('next-prayer-name').innerText = nextPrayer.name;
    document.getElementById('next-prayer-time').innerText = nextPrayer.time + " WIB";

    prayerCountdownInterval = setInterval(function() {
      var now = new Date();
      var diff = nextPrayer.obj - now;

      if (diff <= 0) diff = 0;

      var hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      var minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      var seconds = Math.floor((diff % (1000 * 60)) / 1000);

      var elCdH = document.getElementById('cd-h');
      var elCdM = document.getElementById('cd-m');
      var elCdS = document.getElementById('cd-s');

      if(elCdH) elCdH.innerText = hours.toString().padStart(2, '0');
      if(elCdM) elCdM.innerText = minutes.toString().padStart(2, '0');
      if(elCdS) elCdS.innerText = seconds.toString().padStart(2, '0');

    }, 1000);
  }

  function formatTanggal_(dateStr) {
    if (!dateStr) return '-';
    try {
      var cleanStr = String(dateStr).replace(/'/g, "").trim();
      var parts = cleanStr.split(' ');
      if (parts.length < 2) return cleanStr;
      var d = parts[0].split('-');
      var t = parts[1].split(':');
      var months = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Ags', 'Sep', 'Okt', 'Nov', 'Des'];
      var monthIdx = parseInt(d[1]) - 1;
      var monthName = months[monthIdx] || d[1];
      return d[0] + ' ' + monthName + ' ' + d[2] + ' ' + t[0] + ':' + t[1];
    } catch (e) { return String(dateStr); }
  }

  function loadLaporanData() {
    var bulanAwal = parseInt(document.getElementById('laporan-bulan-awal').value);
    var bulanAkhir = parseInt(document.getElementById('laporan-bulan-akhir').value);
    var tahun = parseInt(document.getElementById('laporan-tahun').value);
    var kelas = document.getElementById('laporan-kelas').value;
    
    document.getElementById('laporan-table-body').innerHTML = '<div class="text-center py-4 text-muted small"><i class="fas fa-circle-notch fa-spin"></i> Memuat data...</div>';
    
    google.script.run.withSuccessHandler(function(result) {
      document.getElementById('lap-total-santri').innerText = result.summary.totalSantri;
      document.getElementById('lap-total-ziyadah').innerText = result.summary.totalZiyadah;
      document.getElementById('lap-total-murajaah').innerText = result.summary.totalMurajaah;
      document.getElementById('lap-total-setor').innerText = result.summary.totalSetor;
      
      // Render table
      var tbody = document.getElementById('laporan-table-body');
      
      if (result.data.length === 0) {
        tbody.innerHTML = '<div class="text-center py-4 text-muted small">Tidak ada data untuk periode ini.</div>';
        return;
      }
      
      var html = '';
      result.data.forEach(function(item, idx) {
        var hasData = item.ziyadahAyat > 0 || item.murajaahAyat > 0;
        var bgColor = idx % 2 === 0 ? '' : 'background:#FAFBFC;';
        var kelasBadge = item.kelas ? ' <span style="font-size:8px;color:#8B5CF6;">' + escapeHtml(item.kelas) + '</span>' : '';
        
        html += '<div class="d-flex align-items-center py-2 px-3 border-bottom" style="font-size:11px;' + bgColor + '">'
          + '<div style="width:30px; color:#94A3B8;">' + (idx + 1) + '</div>'
          + '<div style="flex:1;"><span class="fw-bold text-dark">' + escapeHtml(item.nama) + '</span>' + kelasBadge + '</div>'
          + '<div style="width:55px; text-align:center; color:#EF4444; font-weight:600;">' + item.ziyadahAyat + '</div>'
          + '<div style="width:55px; text-align:center; color:#10B981; font-weight:600;">' + item.murajaahAyat + '</div>'
          + '<div style="width:45px; text-align:center; color:#64748B;">' + item.setorZiyadah + '</div>'
          + '<div style="width:45px; text-align:center; color:#64748B;">' + item.setorMurajaah + '</div>'
          + '</div>';
      });
      
      tbody.innerHTML = html;
      
    }).getMonthlyReport(bulanAwal, bulanAkhir, tahun, kelas);
  }

    var bulanAwal = parseInt(document.getElementById('ls-bulan-awal').value);
    var bulanAkhir = parseInt(document.getElementById('ls-bulan-akhir').value);
    var tahun = parseInt(document.getElementById('ls-tahun').value);
    
    document.getElementById('ls-table-body').innerHTML = '<div class="text-center py-4 text-muted small"><i class="fas fa-circle-notch fa-spin"></i> Memuat...</div>';
    
    google.script.run.withSuccessHandler(function(result) {
      document.getElementById('ls-total-ziyadah').innerText = result.summary.ziyadah;
      document.getElementById('ls-total-murajaah').innerText = result.summary.murajaah;
      document.getElementById('ls-total-setor').innerText = result.summary.totalSetor;
      
      var tbody = document.getElementById('ls-table-body');
      
      if (result.records.length === 0) {
        tbody.innerHTML = '<div class="text-center py-4 text-muted small">Tidak ada data setoran untuk periode ini.</div>';
        return;
      }
      
      var html = '';
      result.records.forEach(function(item) {
        var isZ = item.tipe === 'Ziyadah';
        var tipeColor = isZ ? '#EF4444' : '#10B981';
        var tipeBg = isZ ? '#FEF2F2' : '#ECFDF5';
        
        html += '<div class="d-flex align-items-center py-2 px-2 border-bottom" style="font-size:10px;">'
          + '<div style="width:25px; color:#94A3B8;">' + item.no + '</div>'
          + '<div style="width:95px; color:#64748B;">' + escapeHtml(item.tanggal) + '</div>'
          + '<div style="width:55px; text-align:center;"><span style="background:' + tipeBg + '; color:' + tipeColor + '; padding:2px 6px; border-radius:4px; font-size:8px; font-weight:700;">' + item.tipe.substring(0, 1) + '</span></div>'
          + '<div style="flex:1; font-weight:600; color:#1E293B;">' + escapeHtml(item.surat) + '</div>'
          + '<div style="width:50px; text-align:center; color:#64748B;">' + escapeHtml(item.ayat) + '</div>'
          + '<div style="width:65px; text-align:center; font-weight:600; color:#8B5CF6;">' + escapeHtml(item.nilai) + '</div>'
          + '</div>';
      });
      
      tbody.innerHTML = html;
      
    }).getSantriMonthlyReport(currentLaporanSantriNIS, bulanAwal, bulanAkhir, tahun);
  }
  
  function printSantriLaporan() {
    var bulanAwal = document.getElementById('ls-bulan-awal');
    var bulanAkhir = document.getElementById('ls-bulan-akhir');
    var tahun = document.getElementById('ls-tahun').value;
    
    var bAwalText = bulanAwal.options[bulanAwal.selectedIndex].text;
    var bAkhirText = bulanAkhir.options[bulanAkhir.selectedIndex].text;
    var periode = (bAwalText === bAkhirText) ? bAwalText + ' ' + tahun : bAwalText + ' - ' + bAkhirText + ' ' + tahun;
    
    var summary = {
      ziyadah: document.getElementById('ls-total-ziyadah').innerText,
      murajaah: document.getElementById('ls-total-murajaah').innerText,
      setor: document.getElementById('ls-total-setor').innerText
    };
    
    var rows = document.getElementById('ls-table-body').children;
    var tableRows = '';
    for (var i = 0; i < rows.length; i++) {
      var cells = rows[i].children;
      if (cells.length >= 6) {
        tableRows += '<tr>'
          + '<td style="padding:8px;border-bottom:1px solid #eee;font-size:12px;">' + cells[0].innerText + '</td>'
          + '<td style="padding:8px;border-bottom:1px solid #eee;font-size:12px;">' + cells[1].innerText + '</td>'
          + '<td class="tc" style="padding:8px;border-bottom:1px solid #eee;font-size:12px;">' + cells[2].innerText + '</td>'
          + '<td style="padding:8px;border-bottom:1px solid #eee;font-size:12px;font-weight:600;">' + cells[3].innerText + '</td>'
          + '<td class="tc" style="padding:8px;border-bottom:1px solid #eee;font-size:12px;">' + cells[4].innerText + '</td>'
          + '<td class="tc" style="padding:8px;border-bottom:1px solid #eee;font-size:12px;">' + cells[5].innerText + '</td>'
          + '</tr>';
      }
    }
    
    var printContent = '<!DOCTYPE html><html><head><title>Laporan ' + currentLaporanSantriNama + '</title>'
      + '<style>'
      + 'body{font-family:Arial,sans-serif;padding:30px;color:#333;}'
      + 'h1{font-size:18px;text-align:center;margin-bottom:5px;}'
      + '.periode{text-align:center;font-size:12px;color:#666;margin-bottom:5px;}'
      + '.nama{text-align:center;font-size:14px;font-weight:bold;margin:15px 0;}'
      + '.summary{display:flex;justify-content:space-between;margin:20px 0;padding:15px 20px;background:#f5f5f5;border-radius:8px;}'
      + '.summary-item{text-align:center;flex:1;}'
      + '.summary-item .num{font-size:14px;font-weight:bold;}'
      + '.summary-item .lbl{font-size:14px;color:#333;}'
      + 'table{width:100%;border-collapse:collapse;margin-top:15px;}'
      + 'th{background:#f0f0f0;padding:8px;font-size:11px;text-align:left;border-bottom:2px solid #ddd;}'
      + '.tc{text-align:center;}'
      + '.footer{margin-top:30px;font-size:10px;color:#999;text-align:center;}'
      + '</style></head><body>'
      + '<h1>LAPORAN HAFALAN PER SANTRI</h1>'
      + '<p class="periode">Periode: ' + periode + '</p>'
      + '<div class="nama">' + currentLaporanSantriNama + '</div>'
      + '<div class="summary">'
      + '<div class="summary-item"><span class="num" style="color:#EF4444;">' + summary.ziyadah + '</span> <span class="lbl">Ayat Ziyadah</span></div>'
      + '<div class="summary-item"><span class="num" style="color:#10B981;">' + summary.murajaah + '</span> <span class="lbl">Ayat Murajaah</span></div>'
      + '<div class="summary-item"><span class="num" style="color:#F59E0B;">' + summary.setor + '</span> <span class="lbl">Total Setoran</span></div>'
      + '</div>'
      + '<table><thead><tr><th>No</th><th>Tanggal</th><th>Tipe</th><th>Surat</th><th>Ayat</th><th>Nilai</th></tr></thead>'
      + '<tbody>' + tableRows + '</tbody></table>'
      + '<div class="footer">Dicetak pada ' + new Date().toLocaleDateString('id-ID', {day:'numeric',month:'long',year:'numeric'}) + '</div>'
      + '</body></html>';
    
    var printWindow = window.open('', '_blank');
    printWindow.document.write(printContent);
    printWindow.document.close();
    printWindow.focus();
    setTimeout(function() { printWindow.print(); }, 500);
  }
  
</script>
